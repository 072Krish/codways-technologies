<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form (Aagaz 2K26) </h2>

    <form action="#" method="POST">
        
        <div>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>
        <br>

        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <br>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>
        <br>

        <div>
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
        </div>
        <br>

        <div>
            <label>Skills:</label>
            <input type="checkbox" id="skill1" name="skills" value="html">
            <label for="skill1">HTML</label>
            
            <input type="checkbox" id="skill2" name="skills" value="css">
            <label for="skill2">CSS</label>
            
            <input type="checkbox" id="skill3" name="skills" value="javascript">
            <label for="skill3">JavaScript</label>
        </div>
        <br>

        <div>
            <label for="city">City:</label>
            <select id="city" name="city" required>
                <option value="" disabled selected>Select your city</option>
                <option value="new-york">New York</option>
                <option value="london">London</option>
                <option value="tokyo">Tokyo</option>
            </select>
        </div>
        <br>

        <div>
            <label for="feedback">Feedback / Message:</label><br>
            <textarea id="feedback" name="feedback" rows="4" cols="40" placeholder="Write your message here..."></textarea>
        </div>
        <br>

        <button type="submit">Submit Registration</button>

    </form>

</body>
</html>
