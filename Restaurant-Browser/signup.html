<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sign Up | Restaurant Browser</title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/signup.css">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Toastify CSS -->

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

</head>

<body>

<div class="signup-page">

    <section class="signup-left">

        <div class="signup-hero-content">

            <h1>
                Join & Create 
            </h1>

            <h2>
                Your Account
            </h2>

  <p>
    Discover amazing places to eat, book your favourites
    <br>
    and enjoy every dining moment with confidence.
</p>

            <div class="signup-hero-actions">

                <div class="signup-store-badge">

                    <i class="fa-solid fa-user-plus"></i>

                    <div>

                        <small>Create</small>

                        <strong>Free Account</strong>

                    </div>

                </div>

                <div class="signup-store-badge">

                    <i class="fa-solid fa-location-dot"></i>

                    <div>

                        <small>Discover</small>

                        <strong>Nearby Restaurants</strong>

                    </div>

                </div>

            </div>

        </div>

    </section>

        <!-- Right Side -->

        <section class="signup-right">

            <div class="signup-card">

                <h2>

                    Create Account 🚀

                </h2>

                <p>

                    Join Restaurant Browser today

                </p>

                <form id="signupForm">

                    <!-- Name -->

                    <div class="input-group">

                        <label>

                            Full Name

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-user"></i>

                            <input
                                type="text"
                                id="signupName"
                                placeholder="Enter your full name"
                                required>

                        </div>

                    </div>

                    <!-- Email -->

                    <div class="input-group">

                        <label>

                            Email Address

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="signupEmail"
                                placeholder="Enter your email"
                                required>

                        </div>

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <label>

                            Password

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="signupPassword"
                                placeholder="Create password"
                                required>

                            <i
                                class="fa-solid fa-eye toggle-password"></i>

                        </div>

                    </div>

                    <!-- Confirm Password -->

                    <div class="input-group">

                        <label>

                            Confirm Password

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Confirm password"
                                required>

                            <i
                                class="fa-solid fa-eye toggle-password"></i>

                        </div>

                    </div>

                    <!-- Role -->

                    <div class="input-group">

                        <label>

                            Select Role

                        </label>

                        <div class="role-selection">

                            <label class="role-card">

                                <input
                                    type="radio"
                                    name="role"
                                    value="user"
                                    checked>

                                <i class="fa-solid fa-user"></i>

                                <span>User</span>

                            </label>

                            <label class="role-card">

                                <input
                                    type="radio"
                                    name="role"
                                    value="owner">

                                <i class="fa-solid fa-store"></i>

                                <span>Restaurant Owner</span>

                            </label>

                        </div>

                    </div>

                    <!-- Button -->

                    <button
                        type="submit"
                        class="signup-btn">

                        Create Account

                    </button>

                </form>

                <div class="divider">

                    <span>

                        OR

                    </span>

                </div>

                <button
    type="button"
    class="google-btn"
    disabled>

    <i class="fa-brands fa-google"></i>

    Continue with Google

</button>

<small class="google-note">
    Google login coming soon
</small>


                <div class="login-link">

                    Already have an account?

                    <a href="login.html">

                        Sign In

                    </a>

                </div>

            </div>

        </section>

    </main>

    <script
        type="module"
        src="assets/js/signup.js"></script>
    <script
        type="module"
        src="assets/js/common.js"></script>
    
        

</body>

</html>
