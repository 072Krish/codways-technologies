<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | Restaurant Browser</title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/login.css">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

</head>

<body>
    <div class="login-page">

<section class="login-left">

    <div class="hero-content">

        <h1>
            zomato
        </h1>

        <h2>
            India’s #1
            <span>restaurant browsing app</span>
        </h2>

        <p>
            Experience fast & easy online browsing
            <br>
            on the Zomato app
        </p>

        <div class="hero-actions">

            <div class="store-badge">
                <i class="fa-solid fa-utensils"></i>
                <div>
                    <small>Explore</small>
                    <strong>Restaurants</strong>
                </div>
            </div>

            <div class="store-badge">
                <i class="fa-solid fa-star"></i>
                <div>
                    <small>Find</small>
                    <strong>Top Rated</strong>
                </div>
            </div>

        </div>

    </div>

</section>

        <!-- Right Side -->

        <section class="login-right">

            <div class="login-card">

                <h2>

                    Welcome Back 👋

                </h2>

                <p>

                    Sign in to continue

                </p>

                <form
                    id="loginForm">

                    <!-- Email -->

                    <div class="input-group">

                        <label>

                            Email Address

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="loginEmail"
                                placeholder="Enter your email"
                                required>

                        </div>

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <label>

                            Password

                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="loginPassword"
                                placeholder="Enter your password"
                                required>

                            <i
                                class="fa-solid fa-eye toggle-password"></i>

                        </div>

                    </div>

                    <!-- Options -->

                    <div class="login-options">

                        <label>

                            <input
                                type="checkbox">

                            Remember Me

                        </label>

<a href="#" id="forgotPasswordLink">
    Forgot Password?
</a>

                    </div>

                    <!-- Button -->

                    <button
                        type="submit"
                        class="login-btn">

                        Sign In

                    </button>

                </form>

                <div class="divider">

                    <span>

                        OR

                    </span>

                </div>

<button
    type="button"
    class="google-btn"
    disabled>

    <i class="fa-brands fa-google"></i>

    Continue with Google

</button>

<small class="google-note">
    Google login coming soon
</small>

                <div class="signup-link">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script
        type="module"
        src="assets/js/login.js"></script>
        

</body>

</html>
